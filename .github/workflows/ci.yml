name: CI/CD Pipeline

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: crm_system_db
          POSTGRES_USER: postgresql
          POSTGRES_PASSWORD: postgresql
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage pylint mypy django-stubs isort black

      - name: Validate Nginx config
        env:
          BACKEND_HOST: web
        run: |
          envsubst < nginx.conf > nginx.tmp.conf
          docker run --rm -v $PWD/nginx.tmp.conf:/etc/nginx/conf.d/default.conf:ro nginx:alpine nginx -t

      - name: Create .env file for CI
        run: |
          cat > .env << EOF
          SECRET_KEY=django-insecure-test-key-for-ci-cd
          DEBUG=False
          ALLOWED_HOSTS=localhost,127.0.0.1
          DB_NAME=crm_system_db
          DB_USER=postgresql
          DB_PASSWORD=postgresql
          DB_HOST=localhost
          DB_PORT=5432
          EOF

      - name: Run isort (check)
        run: isort ads/ analytics/ contracts/ customers/ leads/ products/ registration/ users/ CRM_system/ --check-only

      - name: Run Black (check)
        run: black ads/ analytics/ contracts/ customers/ leads/ products/ registration/ users/ CRM_system/ --check

      - name: Run Pylint
        run: pylint ads/ analytics/ contracts/ customers/ leads/ products/ registration/ users/ CRM_system/ --load-plugins=pylint_django --django-settings-module=CRM_system.settings --score=y

      - name: Run Mypy
        run: mypy --config-file=mypy.ini ads/ analytics/ contracts/ customers/ leads/ products/ registration/ users/ CRM_system/

      - name: Run Tests with Coverage
        run: |
          python manage.py migrate
          coverage run manage.py test --keepdb
          coverage report -m
